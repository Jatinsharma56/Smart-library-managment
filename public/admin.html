<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | Library Insights Hub</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      padding: 40px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    h1 {
      margin: 0;
      color: var(--text-strong);
    }
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .card {
      background: var(--glass);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 20px;
      box-shadow: var(--shadow-soft);
    }
    .card h2 {
      margin-top: 0;
      font-size: 1.2rem;
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    th {
      color: var(--text-soft);
      font-weight: 600;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      background: #374151;
      color: #d1d5db;
    }
    .badge.success {
      background: #10b981;
      color: white;
    }
  </style>
</head>
<body>

  <div id="loginSection" class="card" style="max-width: 400px; margin: 0 auto; margin-top: 100px;">
    <h2>Admin Login</h2>
    <div style="margin-bottom: 15px;">
      <label class="form-label">Email</label>
      <input type="email" id="emailInput" class="form-input" value="admin@library.com" />
    </div>
    <div style="margin-bottom: 15px;">
      <label class="form-label">Password</label>
      <input type="password" id="passwordInput" class="form-input" value="admin123" />
    </div>
    <button id="loginBtn" class="btn-primary" style="width: 100%">Login</button>
    <p id="errorMsg" style="color: #ef4444; font-size: 0.85rem; margin-top: 10px;"></p>
  </div>

  <div id="dashboardSection" style="display: none;">
    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>

    <div class="grid-container">
      <div class="card">
        <h2>Active Users</h2>
        <table id="usersTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card">
        <h2>Library Seat Bookings</h2>
        <table id="bookingsTable">
          <thead>
            <tr>
              <th>Zone / Seat</th>
              <th>Time Slot</th>
              <th>User</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card" style="grid-column: span 2;">
        <h2>Reserved Books</h2>
        <table id="booksTable">
          <thead>
            <tr>
              <th>Book Title</th>
              <th>Reserved By</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
